<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Your Estate Walkthrough | Margo's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050a06; color: white; }
        .btn-premium { background: linear-gradient(45deg, #d4af37, #f4d03f); color: #050a06; font-weight: 800; border-radius: 50px; transition: all 0.3s ease; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .btn-premium:disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Style the date/time picker icons for dark mode */
        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full p-10 border border-white/10 rounded-3xl bg-white/5 backdrop-blur-md">
        <h1 class="text-3xl font-serif text-[#d4af37] mb-6 text-center italic">Finalize Your Visit</h1>
        <p class="text-gray-400 text-sm mb-8 text-center">Please select your preferred date and time for Mike's onsite inspection.</p>
        
        <form id="scheduleForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Preferred Date</label>
                <input type="date" id="book_date" required class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Preferred Time</label>
                <input type="time" id="book_time" required class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>

            <!-- Hidden email field populated via URL -->
            <input type="hidden" id="cust_email">

            <button type="submit" id="submitBtn" class="btn-premium w-full py-4">Confirm Appointment</button>
        </form>

        <!-- Success Message -->
        <div id="confirmMsg" class="hidden text-center mt-6 py-4">
            <div class="mb-4 text-4xl">✨</div>
            <h3 class="text-[#d4af37] font-bold text-xl">Appointment Secured.</h3>
            <p class="text-sm text-gray-400 mt-2">Check your inbox for the official confirmation details.</p>
        </div>
    </div>

    <script>
        // 1. WEB APP URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxbH71m6-Vw4pObH65D7HXhnvvuVZ4VRaiV9ffcK1qkQKlqRia6MD7mLONsKq_39REI7Q/exec';
        
        // 2. AUTO-FILL EMAIL FROM URL (?email=user@example.com)
        const urlParams = new URLSearchParams(window.location.search);
        const emailField = document.getElementById('cust_email');
        const userEmail = urlParams.get('email');
        
        if (userEmail) {
            emailField.value = userEmail;
        }

        // 3. HANDLE FORM SUBMISSION
        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('scheduleForm');
            const successMsg = document.getElementById('confirmMsg');

            // Visual feedback
            submitBtn.disabled = true;
            submitBtn.innerText = "Securing Slot...";

            const data = {
                type: 'SCHEDULE', 
                email: emailField.value || "no-email-provided",
                date: document.getElementById('book_date').value,
                time: document.getElementById('book_time').value
            };
            
            fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify(data), 
                headers: { 'Content-Type': 'text/plain' } 
            })
            .then(response => {
                form.classList.add('hidden');
                successMsg.classList.remove('hidden');
            })
            .catch(error => {
                console.error('Error!', error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Try Again";
                alert("Something went wrong. Please check your connection and try again.");
            });
        });
    </script>
</body>
</html>
